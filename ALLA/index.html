<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Golden Vibes Party</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Montserrat', sans-serif; background: radial-gradient(circle at top, #1a1a1a, #000); color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .box { max-width: 400px; width: 100%; text-align: center; border: 1px solid rgba(212,175,55,0.3); border-radius: 12px; padding: 2.5rem 2rem; }
    h1 { font-family: 'Playfair Display', serif; font-size: 36px; color: #D4AF37; margin-bottom: 4px; }
    .sub { font-size: 10px; letter-spacing: 3px; color: rgba(255,255,255,0.3); text-transform: uppercase; margin-bottom: 2rem; }
    .gold-line { height: 1px; background: linear-gradient(90deg, transparent, #D4AF37, transparent); margin: 0 auto 2rem; }
    a { display: block; margin: 10px 0; padding: 12px 20px; text-decoration: none; color: #D4AF37; border: 1px solid rgba(212,175,55,0.3); border-radius: 4px; font-size: 13px; letter-spacing: 1px; transition: all 0.2s; }
    a:hover { background: rgba(212,175,55,0.1); }
  </style>
</head>
<body>
<div class="box">
  <h1>Golden Vibes</h1>
  <p class="sub">A Night To Remember · 04 July 2026</p>
  <div class="gold-line"></div>
  <a href="carte.html">🎨 Générer une carte d'invitation</a>
  <a href="admin.html">⚙️ Gérer les invités</a>
  <a href="invitation.html">🎟️ Page de vérification</a>
</div>
</body>
</html>
